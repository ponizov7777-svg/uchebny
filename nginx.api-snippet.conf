# Вставьте в server { ... } ВЫШЕ общего location /, иначе POST уйдёт в статику и даст HTTP 405.
# Замените 3002 на порт вашего node server.js.

location /api/ {
    proxy_pass http://127.0.0.1:3002;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Запасной путь генерации (тот же обработчик, что /api/generate-text), если /api/ режут отдельным правилом.
location = /ponizov-gt {
    proxy_pass http://127.0.0.1:3002;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
